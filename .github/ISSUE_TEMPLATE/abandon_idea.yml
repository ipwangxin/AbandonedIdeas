name: 提交遗缺点子
description: 把你上线、暂停、放弃或等待接盘的项目、产品或点子留给后来的人。
title: "[遗缺点子] "
labels:
  - abandoned
body:
  - type: markdown
    attributes:
      value: |
        感谢你把这个点子留下来。它可以是已上线但增长停滞的产品，也可以是未上线、暂停维护、开源等待接盘或已经放弃的想法。

        请尽量写清楚现状、卡点和可接手空间，方便后来者判断是否适合借鉴、复盘或接盘。

  - type: input
    id: idea_name
    attributes:
      label: 点子名称
      description: 项目、产品或点子的名字。
      placeholder: 例如：独立开发者周报聚合器
    validations:
      required: true

  - type: textarea
    id: one_liner
    attributes:
      label: 一句话描述
      description: 用一句话说清楚它解决什么问题。
      placeholder: 例如：自动收集独立开发者的周报，按主题生成可订阅摘要。
    validations:
      required: true

  - type: dropdown
    id: project_status
    attributes:
      label: 当前状态
      description: 这个项目现在处于什么阶段？
      options:
        - 已上线，但增长或推广遇到困难
        - 已上线，但暂时停止维护
        - 未上线，只有原型或 Demo
        - 未上线，只有想法或需求文档
        - 已开源，等待更多贡献者或接盘者
        - 已放弃，不计划继续
        - 其他
    validations:
      required: true

  - type: input
    id: live_url
    attributes:
      label: 上线地址
      description: 可选。如果项目已经上线，请填写产品、Demo、落地页或文档地址。
      placeholder: 例如：https://example.com
    validations:
      required: false

  - type: input
    id: source_url
    attributes:
      label: 开源地址
      description: 可选。如果项目已开源，请填写 GitHub、GitLab、Gitee 等代码仓库地址。
      placeholder: 例如：https://github.com/yourname/project
    validations:
      required: false

  - type: dropdown
    id: abandon_reason
    attributes:
      label: 卡住或遗弃原因
      description: 选择最主要的卡点。即使项目已经上线，也可以选择它目前最痛的地方。
      options:
        - 推广困难，找不到用户
        - 时间不够，优先级下降
        - 技术实现难度过高
        - 商业模式不清晰
        - 竞品太强或市场变化
        - 团队或合作者缺失
        - 已被其他方案替代
        - 其他
    validations:
      required: true

  - type: input
    id: tech_stack
    attributes:
      label: 技术栈
      description: 已使用或计划使用的技术。
      placeholder: 例如：Next.js、Supabase、GitHub Actions
    validations:
      required: false

  - type: textarea
    id: done_work
    attributes:
      label: 已做工作
      description: 你已经完成了什么？代码、设计稿、调研、用户访谈都可以写。
      placeholder: |
        - 已完成 MVP 原型
        - 有 3 个访谈记录
        - 代码仓库：https://github.com/...
    validations:
      required: false

  - type: textarea
    id: handoff_notes
    attributes:
      label: 接盘建议
      description: 如果有人想继续做，你建议他从哪里开始？
      placeholder: 例如：先验证 10 个目标用户是否愿意订阅，再补自动化抓取。
    validations:
      required: false

  - type: textarea
    id: contact
    attributes:
      label: 联系方式或补充链接
      description: 可选。留下 GitHub、邮箱、社交账号、讨论帖、文章复盘等。
      placeholder: 例如：https://github.com/yourname
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## 📢 特别提示

        如果你是因为 **“推广困难，找不到用户”** 而放弃，我们的 **【流量互助联盟】** 专门帮你解决这个问题。

        👉 [点击这里立即加入流量互助联盟](https://ipwangxin.github.io/AbandonedIdeas/lianmeng.html)

        你也可以先提交这个遗缺点子，再回到首页查看其他开发者的项目和原因。
